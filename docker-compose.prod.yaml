services:
  nginx:
    build:
      context: .
      dockerfile: Dockerfile.prod
      target: nginx
    container_name: vaulty_nginx
    restart: always
    env_file:
      - .env.prod
    environment:
      - NGINX_ENVSUBST_FILTER=APP_HOST|VITE_PORT|NEST_PORT|S3_BUCKET|S3_HOST|S3_PORT|CORS_ORIGIN
    ports:
      - "${NGINX_PORT}:80"
      - "${NGINX_SSL_PORT}:443"
    volumes:
      - ./nginx.prod.conf.template:/etc/nginx/templates/default.conf.template:ro
    depends_on:
      - server
      - web
    networks:
      - app_network

  database:
    image: postgres:16-alpine
    container_name: vaulty_db
    restart: always
    env_file:
      - .env.prod
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app_network

  s3:
    image: minio/minio:latest
    container_name: vaulty_s3
    restart: always
    env_file:
      - .env.prod
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY}
    command: server /data
    volumes:
      - s3_data:/data
    networks:
      - app_network

  redis:
    image: redis:7-alpine
    container_name: vaulty_redis
    restart: always
    env_file:
      - .env.prod
    volumes:
      - redis_data:/data
    networks:
      - app_network

  server:
    build:
      context: .
      dockerfile: Dockerfile.prod
      target: server
    container_name: vaulty_server
    restart: always
    env_file:
      - .env
    environment:
      NODE_ENV: production
    depends_on:
      - redis
      - s3
      - database
    networks:
      - app_network

  web:
    build:
      context: .
      dockerfile: Dockerfile.prod
      target: web
    container_name: vaulty_web
    restart: always
    env_file:
      - .env
    networks:
      - app_network

volumes:
  postgres_data:
  s3_data:
  redis_data:

networks:
  app_network:
    driver: bridge

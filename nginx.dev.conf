events {
     worker_connections 1024;
}

http {
    resolver 127.0.0.11 valid=30s;

    server {
        listen 80;
        server_name localhost;
        client_max_body_size 64M;

        access_log /var/log/nginx/access.log;
        error_log /var/log/nginx/error.log;

        location /graphql {
            proxy_pass http://server:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Cookie $http_cookie;
            proxy_pass_header Set-Cookie;
            proxy_cache_bypass $http_upgrade;
        }

        location / {
            proxy_pass http://web:5173;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
        }

        # Вместо старого location /storage пишем:
        location /custom-images {
            proxy_pass http://s3:9000; # Передаем запрос как есть (с путем /custom-images)

            # КРИТИЧНО: MinIO проверяет подпись по заголовку Host.
            # Так как подпись генерировалась для "s3:9000", мы должны его передать.
            proxy_set_header Host s3:9000;

            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Оптимизация для передачи файлов
            client_max_body_size 0;
            proxy_buffering off;
        }
    }
}
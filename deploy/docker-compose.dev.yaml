services:
  nginx:
    image: nginx:alpine
    container_name: app_nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/dev.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - client
      - server
    networks:
      - app_network

  database:
    image: postgres:16-alpine
    container_name: nest_database
    restart: always
    environment:
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "123456"
      POSTGRES_DB: "catalog-app"
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      start_period: 5s
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app_network

  s3:
    image: minio/minio:latest
    container_name: nest_s3
    restart: always
    environment:
      MINIO_ROOT_USER: "minioadmin"
      MINIO_ROOT_PASSWORD: "12345678"
    command: server /data --console-address ":9001"
    ports:
      - "900:9000"
      - "9001:9001"
    healthcheck:
      test: [ "CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:9000/minio/health/live || exit 1" ]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - s3_data:/data
    networks:
      - app_network

  redis:
    image: redis:7-alpine
    container_name: nest_redis
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - redis_data:/data
    networks:
      - app_network

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: nest_redis-commander
    environment:
      REDIS_HOSTS: "local:redis:6379"
    ports:
      - "8081:8081"
    depends_on:
      - redis
    networks:
      - app_network

  server:
    build:
      context: ../
      dockerfile: apps/server/Dockerfile.dev
    container_name: nest_server
    restart: always
    command: pnpm run dev
    env_file:
      - ../.env
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
      s3:
        condition: service_healthy
    develop:
      watch:
        - path: ../apps/server
          target: /app/apps/server
          action: sync
          ignore:
            - ../apps/server/node_modules

        - path: ../apps/server/package.json
          action: rebuild
    networks:
      - app_network

  web:
    build:
      context: ../
      dockerfile: apps/web/Dockerfile.dev
    container_name: react_client
    restart: always
    command: pnpm run dev
    env_file:
      - ../.env
    develop:
      watch:
        - path: ../apps/web
          target: /app/apps/web
          action: sync
          ignore:
            - ../apps/web/node_modules

        - path: ../apps/web/package.json
          action: rebuild
    networks:
      - app_network

volumes:
  postgres_data:
  s3_data:
  redis_data:

networks:
  app_network:
    driver: bridge